<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>DepViz - Service Dependency Graph</title>
  </head>
  <body>
    <div id="header">
      <h1>DepViz</h1>
      <div class="controls">
        <span id="ws-status" class="status">Connecting...</span>
        <select id="mode-selector" style="background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 5px; border-radius: 4px;">
          <option value="static">Static Graph</option>
          <option value="dynamic">Inferred Graph</option>
        </select>
        <select id="window-selector" style="background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 5px; border-radius: 4px;">
          <option value="60">Last 1 minute</option>
          <option value="300">Last 5 minutes</option>
          <option value="900">Last 15 minutes</option>
          <option value="3600">Last 1 hour</option>
        </select>
        <button id="refresh-btn" style="background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; cursor: pointer;">Force Refresh</button>
      </div>
    </div>
    <div id="main-container">
      <div id="cy"></div>
      <div id="sidebar">
        <h2 id="side-title">Selection Details</h2>
        <div id="side-content">
          <p>Click a node or edge to see metrics.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
